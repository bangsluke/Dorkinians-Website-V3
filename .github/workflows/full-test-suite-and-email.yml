name: Full test suite (test:all) and summary email

on:
  push:
    branches:
      - main
  schedule:
    # Tuesday 02:17 UTC — weekly full suite (same as test:all on main)
    - cron: '17 2 * * 2'
  workflow_dispatch:

concurrency:
  group: full-test-suite-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  full_test_suite:
    name: Full test suite and email
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run test:all and send CI summary email
        timeout-minutes: 90
        env:
          WEBSITE_URL: ${{ secrets.WEBSITE_URL != '' && secrets.WEBSITE_URL || 'https://dorkinians-website-v3.netlify.app' }}
          HEADLESS: 'true'
          CI: 'true'
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          SMTP_TO_EMAIL: ${{ secrets.SMTP_TO_EMAIL }}
          SMTP_EMAIL_SECURE: ${{ secrets.SMTP_EMAIL_SECURE || 'false' }}
          SEND_CI_TEST_ALL_SUMMARY_EMAIL: 'true'
          WORKFLOW_TRIGGER_LABEL: "${{ format('{0} @ {1} ({2})', github.event_name, github.ref_name, github.sha) }}"
        run: npm run test:all

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: __tests__/e2e/playwright-report/
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: __tests__/e2e/test-results/screenshots/
          retention-days: 30
